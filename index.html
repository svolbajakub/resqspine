<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ResqSpine®</title>
    
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f2f2f7;
            --card: #ffffff;
            --text-main: #000000;
            --text-muted: #6e6e73;
            --primary: #007AFF;
            --accent: #ff3b30;
            --success: #4cd964;
            --border: #d1d1d6;
            --safe-top: env(safe-area-inset-top);
        }

        .dark-mode {
            --bg: #000000;
            --surface: #1c1c1e;
            --card: #2c2c2e;
            --text-main: #ffffff;
            --text-muted: #a1a1a6;
            --border: #38383a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: var(--safe-top);
        }

        header {
            display: flex;
            justify-content: center;
            padding: 15px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .app-title { font-weight: 900; font-size: 1.4rem; letter-spacing: -0.8px; }
        .trademark { font-size: 0.6rem; vertical-align: top; margin-left: 2px; color: var(--text-muted); }

        .container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Tlačítko dolů, karta doprostřed */
            align-items: center;
        }

        .question-card {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            text-align: center;
            border: 1px solid var(--border);
            margin-top: auto; /* Vycentrování vertikálně */
            margin-bottom: auto;
        }

        .q-text { font-size: 1.4rem; font-weight: 900; margin-bottom: 15px; }
        .q-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 25px; display: block; line-height: 1.3; }

        .btn-group { display: flex; gap: 10px; width: 100%; }
        .btn {
            flex: 1;
            padding: 20px;
            border-radius: 15px;
            border: none;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
        }
        .btn-yes { background: var(--accent); color: white; }
        .btn-no { background: var(--primary); color: white; }

        /* Decentní tlačítko restartu */
        .btn-restart {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.9rem;
            padding: 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fixate { color: var(--accent); font-size: 2.2rem; font-weight: 900; }
        .clear { color: var(--success); font-size: 2.2rem; font-weight: 900; }
    </style>
</head>
<body>

    <header>
        <div class="app-title">ResqSpine<span class="trademark">®</span></div>
    </header>

    <div class="container">
        <div id="card" class="question-card">
            </div>
        
        <button class="btn-restart" onclick="start()">↺ Restartovat</button>
    </div>

<script>
    const steps = {
        start: {
            q: "Vysoké riziko?",
            sub: "Věk ≥ 65, pád z výšky, autonehoda (> 100 km/h), parestézie končetin.",
            yes: "fixate",
            no: "lowRisk"
        },
        lowRisk: {
            q: "Nízké riziko?",
            sub: "Náraz zezadu, sedící/chodící pac., opožděná bolest, BEZ citlivosti v ose páteře.",
            yes: "rotation",
            no: "fixate"
        },
        rotation: {
            q: "Rotace hlavy 45°?",
            sub: "Dokáže otočit hlavu vlevo i vpravo bez ohledu na bolest?",
            yes: "clear",
            no: "fixate"
        },
        fixate: {
            isResult: true,
            type: "fixate",
            text: "⚠️ FIXOVAT",
            sub: "Pacient nesplňuje kritéria pro vyřazení. Použijte imobilizaci."
        },
        clear: {
            isResult: true,
            type: "clear",
            text: "✅ BEZ LÍMCE",
            sub: "Nízké riziko a plná hybnost. Fixace není nutná."
        }
    };

    function render(stepId) {
        const step = steps[stepId];
        const card = document.getElementById('card');

        if (step.isResult) {
            card.innerHTML = `
                <div class="${step.type}">${step.text}</div>
                <p class="q-sub" style="margin-top:15px;">${step.sub}</p>
            `;
        } else {
            card.innerHTML = `
                <div class="q-text">${step.q}</div>
                <span class="q-sub">${step.sub}</span>
                <div class="btn-group">
                    <button class="btn btn-yes" onclick="render('${step.yes}')">ANO</button>
                    <button class="btn btn-no" onclick="render('${step.no}')">NE</button>
                </div>
            `;
        }
    }

    function start() { render('start'); }
    start();
</script>
</body>
</html>
